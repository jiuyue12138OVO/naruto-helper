<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- 🔥 请求拦截（屏蔽飞书/监控请求） -->
    <script>
      (function() {
        const blockedPaths = [
          '/spark/',
          'get_published',
          'tenant_info',
          'user_info',
          'current_server_timestamp',
          'metrics/collect'
        ];
        const blockedDomains = [
          'feishu.cn',
          'feishu-boe.cn',
          'feishu-pre.cn',
          'feishuapp.net',
          'bytednsdoc.com',
          'mon.zijieapi.com'
        ];

        function shouldBlock(url) {
          if (!url) return false;
          return blockedPaths.some(p => url.includes(p)) ||
                 blockedDomains.some(d => url.includes(d));
        }

        function createFakeResponse(url) {
          if (blockedPaths.some(p => url.includes(p)) || url.includes('mon.zijieapi.com')) {
            return new Response(JSON.stringify({ code: 0, data: null }), {
              status: 200,
              headers: { 'Content-Type': 'application/json' }
            });
          }
          const transparentPng = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=';
          return new Response(transparentPng, {
            status: 200,
            headers: { 'Content-Type': 'image/png' }
          });
        }

        const originalFetch = window.fetch;
        window.fetch = function(...args) {
          const url = typeof args[0] === 'string' ? args[0] : (args[0] && args[0].url);
          if (shouldBlock(url)) return Promise.resolve(createFakeResponse(url));
          return originalFetch.apply(this, args);
        };

        const OriginalXHR = window.XMLHttpRequest;
        window.XMLHttpRequest = function() {
          const xhr = new OriginalXHR();
          const originalOpen = xhr.open;
          xhr.open = function(method, url, ...rest) {
            if (shouldBlock(url)) return;
            return originalOpen.call(this, method, url, ...rest);
          };
          return xhr;
        };

        const originalPostMessage = window.postMessage;
        window.postMessage = function(message, targetOrigin, transfer) {
          if (targetOrigin && blockedDomains.some(d => targetOrigin.includes(d))) return;
          return originalPostMessage.call(this, message, targetOrigin, transfer);
        };
      })();
    </script>

    <!-- 🔥 早期版本检测 + 更新提示 -->
    <script>
      (function() {
        const LATEST_DATA_VERSION = '2026-07-15-11-27'; // 必须与 DataContext.tsx 中的 DATA_VERSION 一致
        try {
          const storedVersion = localStorage.getItem('naruto_data_version');
          if (storedVersion !== LATEST_DATA_VERSION) {
            // 清除所有旧数据
            const keys = [
              'naruto_ninjas',
              'naruto_scrolls',
              'naruto_recommendations',
              'naruto_summons',
              'naruto_counters',
              'naruto_ninja_tags',
              'naruto_blind_pick_order'
            ];
            keys.forEach(function(k) { localStorage.removeItem(k); });
            // 写入最新版本号
            localStorage.setItem('naruto_data_version', LATEST_DATA_VERSION);
            // 显示更新提示覆盖层（DOM 加载后执行）
            document.addEventListener('DOMContentLoaded', function() {
              var div = document.createElement('div');
              div.id = 'update-overlay';
              div.style.cssText = 'position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);';
              div.innerHTML = '<div style="background:#1f2937;border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:30px 40px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.5);color:#e5e7eb;"><div style="width:40px;height:40px;border:4px solid #e74c3c;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;"></div><p style="font-size:18px;font-weight:600;margin:0 0 8px;">检测到数据更新</p><p style="font-size:14px;color:#9ca3af;margin:0;">正在为您加载最新版本，请稍候…</p></div>';
              document.body.appendChild(div);
              // 1.5 秒后刷新页面
              setTimeout(function() { window.location.reload(); }, 1500);
            });
          }
        } catch(e) {}
      })();
    </script>

    <!-- 🔥 引入图标 Base64 数据（外部文件） -->
    <script src="icon-base64.js"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>火影忍者辅助助手</title>

    <!-- 🔥 标题守护 -->
    <script>
      (function() {
        const TITLE = "火影忍者辅助助手";
        document.title = TITLE;
        new MutationObserver(function() {
          if (document.title !== TITLE) document.title = TITLE;
        }).observe(document.querySelector('title') || document.head, {
          childList: true, subtree: true, characterData: true
        });
      })();
    </script>

    <!-- 🔥 图标守护：从全局变量获取 Base64，后备内联字符串确保万无一失 -->
    <script>
      (function() {
        const ICON_HREF = window.__NARUTO_ICON_BASE64__ || "data:image/png;base64,YOUR_BACKUP_BASE64_STRING";

        function ensureIcon() {
          const icons = document.querySelectorAll('link[rel="icon"], link[rel="shortcut icon"]');
          let found = false;
          icons.forEach(icon => {
            if (icon.getAttribute('href') === ICON_HREF) {
              found = true;
            } else {
              icon.remove(); // 移除非我们的图标
            }
          });
          if (!found) {
            const link = document.createElement('link');
            link.rel = 'icon';
            link.type = 'image/png';
            link.href = ICON_HREF;
            document.head.appendChild(link);
            // 同时添加 shortcut icon 以确保兼容性
            const link2 = document.createElement('link');
            link2.rel = 'shortcut icon';
            link2.type = 'image/png';
            link2.href = ICON_HREF;
            document.head.appendChild(link2);
          }
        }

        // 立即执行一次，然后监听变化
        ensureIcon();
        new MutationObserver(ensureIcon).observe(document.head, {
          childList: true,
          subtree: true,
          attributes: true,
          attributeFilter: ['href']
        });
      })();
    </script>

    <!-- SPA 路由恢复 -->
    <script>
      (function(){
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) history.replaceState(null, null, redirect);
      })();
    </script>

    <style>
      /* 加载中与更新提示的动画 */
      @keyframes spin { to { transform: rotate(360deg); } }
      #initial-loading {
        position: fixed; inset: 0; z-index: 99998; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
        display: flex; align-items: center; justify-content: center;
      }
      #initial-loading > div {
        background: #1f2937; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
        padding: 30px 40px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.5); color: #e5e7eb;
      }
      #initial-loading p { margin: 0; }
      #initial-loading .spinner {
        width: 40px; height: 40px; border: 4px solid #e74c3c; border-top-color: transparent;
        border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px;
      }
    </style>

        <p style="font-size:14px;color:#9ca3af;">请稍后…</p>

    <div id="root"></div>
