<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>火影忍者辅助助手</title>
    <link href="https://lf3-static.bytednsdoc.com/obj/eden-cn/ylcylz_fsph_ryhs/ljhwZthlaukjlkulzlp/feisuda/feisuda.svg" rel="shortcut icon"/>
    
    <!-- 🔥 版本更新（无刷新） -->
    <script>
      (function() {
        const LATEST_DATA_VERSION = '2026-07-11-18-46';   // 每次更新数据后修改此处
        try {
          const storedVersion = localStorage.getItem('naruto_data_version');
          if (storedVersion !== LATEST_DATA_VERSION) {
            // 清除所有旧数据
            const keys = [
              'naruto_ninjas',
              'naruto_scrolls',
              'naruto_recommendations',
              'naruto_summons',
              'naruto_counters',
              'naruto_ninja_tags',
              'naruto_blind_pick_order'
            ];
            keys.forEach(function(k) { localStorage.removeItem(k); });
            // 写入最新版本号（无需刷新，页面会自然加载新数据）
            localStorage.setItem('naruto_data_version', LATEST_DATA_VERSION);
          }
        } catch(e) {}
      })();
    </script>

    <script>
      // 强制守护标题，防止被 AppContainer 覆盖
      (function() {
        const TITLE = "火影忍者辅助助手";
        document.title = TITLE;
        new MutationObserver(function() {
          if (document.title !== TITLE) {
            document.title = TITLE;
          }
        }).observe(document.querySelector('title') || document.head, {
          childList: true,
          subtree: true,
          characterData: true
        });
      })();
    </script>

    <script>
      // SPA 路由恢复：配合 404.html 实现刷新页面时正常显示对应页面
      (function(){
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
