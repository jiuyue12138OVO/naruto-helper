<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- 🔥 请求拦截（屏蔽飞书/监控请求） -->
    <script>
      (function() {
        const blockedPaths = [
          '/spark/',
          'get_published',
          'tenant_info',
          'user_info',
          'current_server_timestamp',
          'metrics/collect'
        ];
        const blockedDomains = [
          'feishu.cn',
          'feishu-boe.cn',
          'feishu-pre.cn',
          'feishuapp.net',
          'bytednsdoc.com',
          'mon.zijieapi.com'
        ];

        function shouldBlock(url) {
          if (!url) return false;
          return blockedPaths.some(p => url.includes(p)) ||
                 blockedDomains.some(d => url.includes(d));
        }

        function createFakeResponse(url) {
          if (blockedPaths.some(p => url.includes(p)) || url.includes('mon.zijieapi.com')) {
            return new Response(JSON.stringify({ code: 0, data: null }), {
              status: 200,
              headers: { 'Content-Type': 'application/json' }
            });
          }
          const transparentPng = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=';
          return new Response(transparentPng, {
            status: 200,
            headers: { 'Content-Type': 'image/png' }
          });
        }

        const originalFetch = window.fetch;
        window.fetch = function(...args) {
          const url = typeof args[0] === 'string' ? args[0] : (args[0] && args[0].url);
          if (shouldBlock(url)) return Promise.resolve(createFakeResponse(url));
          return originalFetch.apply(this, args);
        };

        const OriginalXHR = window.XMLHttpRequest;
        window.XMLHttpRequest = function() {
          const xhr = new OriginalXHR();
          const originalOpen = xhr.open;
          xhr.open = function(method, url, ...rest) {
            if (shouldBlock(url)) return;
            return originalOpen.call(this, method, url, ...rest);
          };
          return xhr;
        };

        const originalPostMessage = window.postMessage;
        window.postMessage = function(message, targetOrigin, transfer) {
          if (targetOrigin && blockedDomains.some(d => targetOrigin.includes(d))) return;
          return originalPostMessage.call(this, message, targetOrigin, transfer);
        };
      })();
    </script>

    <!-- 图标：使用你的 GIF 文件 -->
    <link rel="icon" type="image/gif" href="/naruto.gif" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>火影忍者辅助助手</title>

    <!-- 🔥 标题守护 -->
    <script>
      (function() {
        const TITLE = "火影忍者辅助助手";
        document.title = TITLE;
        new MutationObserver(function() {
          if (document.title !== TITLE) document.title = TITLE;
        }).observe(document.querySelector('title') || document.head, {
          childList: true, subtree: true, characterData: true
        });
      })();
    </script>

    <!-- 🔥 图标守护（监听 DOM 变化，防止被删除或修改） -->
    <script>
      (function() {
        const ICON_PATH = '/naruto.gif';

        function ensureIcon() {
          const icons = document.querySelectorAll('link[rel="icon"], link[rel="shortcut icon"]');
          let hasValidIcon = false;

          icons.forEach(icon => {
            if (icon.getAttribute('href') !== ICON_PATH) {
              icon.remove();
            } else {
              hasValidIcon = true;
            }
          });

          if (!hasValidIcon) {
            const link = document.createElement('link');
            link.rel = 'icon';
            link.type = 'image/gif';
            link.href = ICON_PATH;
            document.head.appendChild(link);
          }
        }

        ensureIcon();
        new MutationObserver(ensureIcon).observe(document.head, {
          childList: true,
          subtree: true,
          attributes: true,
          attributeFilter: ['href']
        });
      })();
    </script>

    <!-- SPA 路由恢复 -->
    <script>
      (function(){
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) history.replaceState(null, null, redirect);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
